<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione um perfil para começar a assistir na Netflix">
    <title>Netflix - Seleção de Perfil</title>
    <link rel="icon" type="image/png" href="assets/icone.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Ativar modo claro">🌙</button>

    <main>
        <section>
            <h1>Quem está assistindo?</h1>
            <ul class="profiles">
                <li>
                    <article class="profile">
                        <a href="catalogo/catalogo.html" class="perfil-link" data-perfil="Gustavo" data-img="../assets/perfil-1.jpg" aria-label="Selecionar perfil Gustavo">
                            <figure>
                                <img src="assets/perfil-1.jpg" alt="Perfil 1">
                                <figcaption>Gustavo</figcaption>
                            </figure>
                        </a>
                    </article>
                </li>
                <li>
                    <article class="profile">
                        <a href="catalogo/catalogo.html" class="perfil-link" data-perfil="Thiago" data-img="../assets/perfil-2.jpg" aria-label="Selecionar perfil Thiago">
                            <figure>
                                <img src="assets/perfil-2.jpg" alt="Perfil 2">
                                <figcaption>Thiago</figcaption>
                            </figure>
                        </a>
                    </article>
                </li>
                <li>
                    <article class="profile">
                        <a href="catalogo/catalogo.html" class="perfil-link" data-perfil="Marina" data-img="../assets/perfil-3.jpg" aria-label="Selecionar perfil Marina">
                            <figure>
                                <img src="assets/perfil-3.jpg" alt="Perfil 3">
                                <figcaption>Marina</figcaption>
                            </figure>
                        </a>
                    </article>
                </li>
                <li>
                    <article class="profile">
                        <a href="catalogo/catalogo.html" class="perfil-link" data-perfil="Ana" data-img="../assets/perfil-4.jpg" aria-label="Selecionar perfil Ana">
                            <figure>
                                <img src="assets/perfil-4.jpg" alt="Perfil 4">
                                <figcaption>Ana</figcaption>
                            </figure>
                        </a>
                    </article>
                </li>
            </ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
